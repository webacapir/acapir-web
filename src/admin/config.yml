backend:
  name: git-gateway
  branch: main

media_folder: "src/assets/img"
public_folder: "/assets/img"

locale: ca

collections:

  - name: "config_general"
    label: "1 · Configuració general"
    files:
      - label: "SEO i metadades"
        name: "seo"
        file: "src/_data/config.json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - { label: "Títol de la pàgina", name: "titol", widget: "string" }
              - { label: "Descripció en català (Google)", name: "descripcio_ca", widget: "text" }
              - { label: "Descripción en castellano (Google)", name: "descripcio_es", widget: "text" }
              - { label: "Paraules clau", name: "paraules_clau", widget: "string", required: false }
          - label: "Hero — Títols de les 4 seccions"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Secció 01 — català", name: "s01_ca", widget: "string" }
              - { label: "Secció 01 — castellano", name: "s01_es", widget: "string" }
              - { label: "Secció 02 — català", name: "s02_ca", widget: "string" }
              - { label: "Secció 02 — castellano", name: "s02_es", widget: "string" }
              - { label: "Secció 03 — català", name: "s03_ca", widget: "string" }
              - { label: "Secció 03 — castellano", name: "s03_es", widget: "string" }
              - { label: "Secció 04 — català", name: "s04_ca", widget: "string" }
              - { label: "Secció 04 — castellano", name: "s04_es", widget: "string" }
          - label: "Destacat NOU"
            name: "nou"
            widget: "object"
            fields:
              - { label: "Text (català)", name: "ca", widget: "string" }
              - { label: "Texto (castellano)", name: "es", widget: "string" }
              - { label: "Data (ex: Juny 2026)", name: "data", widget: "string" }
              - { label: "Enllaç (ex: #actualitat)", name: "link", widget: "string" }

  - name: "qui_som"
    label: "2 · Qui som"
    files:
      - label: "Presentació i Associa't"
        name: "qui_som"
        file: "src/_data/config.json"
        fields:
          - label: "Text de presentació"
            name: "presentacio"
            widget: "object"
            fields:
              - { label: "Text (català)", name: "ca", widget: "text" }
              - { label: "Texto (castellano)", name: "es", widget: "text" }
          - label: "Bloc Associa't"
            name: "associa"
            widget: "object"
            fields:
              - { label: "Títol (català)", name: "titol_ca", widget: "string" }
              - { label: "Título (castellano)", name: "titol_es", widget: "string" }
              - { label: "Text explicatiu (català)", name: "text_ca", widget: "text" }
              - { label: "Texto explicativo (castellano)", name: "text_es", widget: "text" }
              - { label: "Botó — català", name: "btn_ca", widget: "string" }
              - { label: "Botón — castellano", name: "btn_es", widget: "string" }
              - { label: "Enllaç", name: "link", widget: "string" }

  - name: "junta"
    label: "3 · Junta Directiva"
    files:
      - label: "Membres i foto de grup"
        name: "membres"
        file: "src/_data/junta.json"
        fields:
          - { label: "Foto de grup (opcional)", name: "foto_grup", widget: "image", required: false, hint: "Si s'afegeix, apareix al costat de la junta. Si no, no apareix res." }
          - label: "Membres"
            name: "membres"
            widget: "list"
            fields:
              - { label: "Càrrec (català)", name: "rol_ca", widget: "string" }
              - { label: "Cargo (castellano)", name: "rol_es", widget: "string" }
              - { label: "Nom complet", name: "nom", widget: "string" }
              - { label: "És vocal?", name: "vocal", widget: "boolean", default: false }
              - { label: "Foto individual (opcional)", name: "foto", widget: "image", required: false, hint: "Apareixerà en un cercle al costat del nom. Si no s'afegeix, apareix només el nom." }

  - name: "linies"
    label: "4 · Línies de treball"
    files:
      - label: "Les línies"
        name: "items"
        file: "src/_data/linies.json"
        fields:
          - label: "Línies"
            name: "items"
            widget: "list"
            fields:
              - { label: "Text (català)", name: "ca", widget: "text" }
              - { label: "Texto (castellano)", name: "es", widget: "text" }

  - name: "noticias"
    label: "5 · Notícies"
    label_singular: "Notícia"
    folder: "src/noticias"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Títol (català)", name: "title_ca", widget: "string" }
      - { label: "Título (castellano)", name: "title_es", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Resum (català)", name: "resum_ca", widget: "text", required: false }
      - { label: "Resumen (castellano)", name: "resum_es", widget: "text", required: false }
      - { label: "Text complet (català)", name: "cos_ca", widget: "markdown", required: false, hint: "Si s'omple, el botó expandeix la notícia. Si no, el botó porta a l'enllaç extern." }
      - { label: "Texto completo (castellano)", name: "cos_es", widget: "markdown", required: false }
      - { label: "Imatge (opcional)", name: "image", widget: "image", required: false }
      - { label: "Enllaç extern", name: "link", widget: "string", required: false }
      - { label: "Text del botó (català)", name: "link_text_ca", widget: "string", required: false, default: "Llegir més" }
      - { label: "Texto del botón (castellano)", name: "link_text_es", widget: "string", required: false, default: "Leer más" }
      - { label: "Esborrany — no publicar", name: "esborrany", widget: "boolean", default: false }

  - name: "recursos"
    label: "6 · Documentació i Recursos"
    label_singular: "Recurs"
    folder: "src/recursos"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Títol (català)", name: "title_ca", widget: "string" }
      - { label: "Título (castellano)", name: "title_es", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Tipus (PDF, Vídeo...)", name: "tipus", widget: "string", required: false }
      - { label: "Resum (català)", name: "resum_ca", widget: "text", required: false }
      - { label: "Resumen (castellano)", name: "resum_es", widget: "text", required: false }
      - { label: "Autors", name: "autors", widget: "string", required: false }
      - { label: "ISBN", name: "isbn", widget: "string", required: false }
      - { label: "Llicència", name: "llicencia", widget: "string", required: false }
      - { label: "Imatge portada (opcional)", name: "image", widget: "image", required: false }
      - { label: "Enllaç", name: "link", widget: "string" }
      - { label: "Recurs destacat", name: "destacat", widget: "boolean", default: false }
      - { label: "Esborrany — no publicar", name: "esborrany", widget: "boolean", default: false }

  - name: "formacio"
    label: "7 · Arxiu de Formació"
    label_singular: "Material"
    folder: "src/formacio"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Títol (català)", name: "title_ca", widget: "string" }
      - { label: "Título (castellano)", name: "title_es", widget: "string" }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Tipus (PDF, Vídeo...)", name: "tipus", widget: "string", default: "PDF" }
      - { label: "Enllaç", name: "link", widget: "string" }

  - name: "documents"
    label: "8 · Documents institucionals"
    label_singular: "Document"
    folder: "src/documents"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Títol (català)", name: "title_ca", widget: "string" }
      - { label: "Título (castellano)", name: "title_es", widget: "string" }
      - { label: "Descripció (català)", name: "descripcio_ca", widget: "string", required: false }
      - { label: "Descripción (castellano)", name: "descripcio_es", widget: "string", required: false }
      - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Fitxer PDF", name: "fitxer", widget: "file" }
      - { label: "Esborrany — no publicar", name: "esborrany", widget: "boolean", default: false }

  - name: "contacte"
    label: "9 · Contacte"
    files:
      - label: "Dades de contacte i xarxes"
        name: "contacte"
        file: "src/_data/config.json"
        fields:
          - label: "Contacte"
            name: "contacte"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Títol secció (català)", name: "titol_ca", widget: "string" }
              - { label: "Título sección (castellano)", name: "titol_es", widget: "string" }
              - { label: "Subtítol (català)", name: "subtitol_ca", widget: "string" }
              - { label: "Subtítulo (castellano)", name: "subtitol_es", widget: "string" }
          - label: "Xarxes socials"
            name: "xarxes"
            widget: "object"
            fields:
              - { label: "Twitter / X (URL)", name: "twitter", widget: "string" }
              - { label: "Instagram (URL)", name: "instagram", widget: "string" }
