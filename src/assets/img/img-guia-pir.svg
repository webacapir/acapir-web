<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <rect width="600" height="340" fill="#0a0a0a"/>
  <!-- Grid de fons -->
  <line x1="0" y1="85" x2="600" y2="85" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="0" y1="170" x2="600" y2="170" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="0" y1="255" x2="600" y2="255" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="340" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="340" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="340" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <!-- Barres del gràfic: places PIR augmentant -->
  <rect x="80" y="220" width="60" height="80" fill="rgba(74,221,213,.2)" rx="2"/>
  <rect x="170" y="190" width="60" height="110" fill="rgba(74,221,213,.3)" rx="2"/>
  <rect x="260" y="155" width="60" height="145" fill="rgba(74,221,213,.45)" rx="2"/>
  <rect x="350" y="115" width="60" height="185" fill="rgba(74,221,213,.6)" rx="2"/>
  <rect x="440" y="70" width="60" height="230" fill="#4ADDD5" rx="2"/>
  <!-- Fletxa tendència -->
  <polyline points="110,220 200,185 290,148 380,110 470,65" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2" stroke-dasharray="5,4"/>
  <!-- Fletxa cap amunt -->
  <line x1="500" y1="65" x2="500" y2="30" stroke="#fff" stroke-width="2.5"/>
  <polyline points="494,38 500,28 506,38" fill="none" stroke="#fff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Text -->
  <text x="80" y="30" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#4ADDD5" letter-spacing="2">PLACES PIR</text>
  <text x="80" y="50" font-family="Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="300" fill="rgba(255,255,255,.5)" letter-spacing="1">FORMACIÓ ESPECIALITZADA</text>
</svg>