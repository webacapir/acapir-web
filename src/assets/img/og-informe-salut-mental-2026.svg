<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect x="0" y="0" width="8" height="630" fill="#4ADDD5"/>
  <!-- Fons subtil: línies de grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
  <!-- Xifra gran de fons -->
  <text x="60" y="580" font-family="Helvetica Neue, Arial, sans-serif" font-size="300" font-weight="800"
    fill="rgba(74,221,213,.05)" letter-spacing="-10">80%</text>
  <!-- Etiqueta -->
  <text x="60" y="120" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700"
    fill="#4ADDD5" letter-spacing="3" text-transform="uppercase">INFORME · JUNY 2026 · SCPC-ACAPIR</text>
  <!-- Títol -->
  <text x="60" y="210" font-family="Helvetica Neue, Arial, sans-serif" font-size="56" font-weight="800"
    fill="#ffffff" letter-spacing="-1">La salut mental a Catalunya:</text>
  <text x="60" y="280" font-family="Helvetica Neue, Arial, sans-serif" font-size="56" font-weight="800"
    fill="#ffffff" letter-spacing="-1">entre el discurs institucional</text>
  <text x="60" y="350" font-family="Helvetica Neue, Arial, sans-serif" font-size="56" font-weight="800"
    fill="#4ADDD5" letter-spacing="-1">i la pràctica real</text>
  <!-- Dada clau -->
  <text x="60" y="440" font-family="Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="300"
    fill="rgba(255,255,255,.7)">Més del 80% dels psicòlegs clínics de la xarxa pública no té temps per pensar els casos que atén.</text>
  <!-- DOI -->
  <text x="60" y="590" font-family="Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="400"
    fill="rgba(255,255,255,.35)">DOI: 10.5281/zenodo.20686884 · ISBN: 978-84-09-87424-8 · CC BY-NC-SA 4.0</text>
</svg>